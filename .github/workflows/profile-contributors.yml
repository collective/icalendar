# Run gh-profiler against the author of each new issue and PR.
# Skip profiling for contributors who already have many merged PRs.
# See https://github.com/ehmatthes/gh-profiler
# See https://github.com/collective/icalendar/issues/1580

name: Profile contributors

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  profile-author:
    runs-on: ubuntu-latest

    steps:
      - name: Determine target login and issue number
        id: meta
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "login=${{ github.event.issue.user.login }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "login=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if contributor already has many merged PRs
        id: check_contributor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          login="${{ steps.meta.outputs.login }}"
          # Number of merged PRs required to skip the profile summary.
          threshold=3
          # Count merged PRs by this user in this repository.
          merged_count=$(gh api \
            "search/issues?q=repo:${{ github.repository }}+type:pr+is:merged+author:${login}" \
            --jq '.total_count' 2>/dev/null || echo "0")
          echo "User '$login' has $merged_count merged PR(s) in this repository (threshold: $threshold)"
          if [ "$merged_count" -ge "$threshold" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping profile: contributor has $merged_count merged PRs (>= $threshold)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff  # v6
        if: steps.check_contributor.outputs.skip != 'true'

      - name: Install gh-profiler
        if: steps.check_contributor.outputs.skip != 'true'
        run: uv tool install gh-profiler==0.8.3

      - name: Run gh-profiler
        if: steps.check_contributor.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh-profiler "${{ steps.meta.outputs.login }}" --concise > concise.txt
          gh-profiler "${{ steps.meta.outputs.login }}" > full.txt

      - name: Comment on issue or PR
        if: steps.check_contributor.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          {
            echo "Profile summary:"
            echo
            echo '```text'
            cat concise.txt
            echo '```'
            echo
            echo '<details>'
            echo '<summary>Full profile</summary>'
            echo
            echo '```text'
            cat full.txt
            echo '```'
            echo
            echo '</details>'
          } > body.txt

          jq -Rs '{body: .}' body.txt > payload.json

          gh api \
            repos/${{ github.repository }}/issues/${{ steps.meta.outputs.number }}/comments \
            --input payload.json
